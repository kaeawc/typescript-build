name: "setup-bun-turbo"
description: "Install Bun, restore bun/turbo caches, and install project dependencies."
inputs:
  bun-version:
    description: "Bun version to install"
    default: "1.3.13"
    required: false
  shell:
    description: "Shell to use for run steps"
    default: "bash"
    required: false

runs:
  using: "composite"
  steps:
    - name: "Setup Bun"
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: "Cache Bun dependencies"
      uses: actions/cache@v4
      with:
        path: |
          ~/.bun/install/cache
          node_modules
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-

    - name: "Cache Turborepo"
      uses: actions/cache@v4
      with:
        path: .turbo
        key: turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ github.sha }}
        restore-keys: |
          turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
          turbo-${{ runner.os }}-

    - name: "Install dependencies"
      shell: ${{ inputs.shell }}
      run: |
        bun install --frozen-lockfile || {
          bun pm cache rm
          bun install --frozen-lockfile
        }
        echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"
