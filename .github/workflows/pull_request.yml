name: "Pull Request"

on:
  pull_request:
    branches:
      - "**"

concurrency:
  group: pull-request-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  checks: write
  contents: read
  pull-requests: write

jobs:
  # =============================================================================
  # Change Detection
  # =============================================================================
  detect-changes:
    name: "Detect Documentation-Only Changes"
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Check for documentation-only changes"
        id: filter
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.issue.number;
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const docPatterns = [
              /\.md$/,
              /^docs\//,
              /^\.lychee\.toml$/,
            ];
            const isDocFile = filename => docPatterns.some(p => p.test(filename));
            const allFilesAreDocs = files.length > 0 && files.every(f => isDocFile(f.filename));

            console.log('Files changed:', files.map(f => f.filename).join(', '));
            console.log('All files are docs:', allFilesAreDocs);

            core.setOutput('docs_only', allFilesAreDocs.toString());

  # =============================================================================
  # Turbo-cached lint / build / test across OS matrix
  # =============================================================================
  turbo-validate:
    name: "Turbo Validate (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    needs: detect-changes
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: "Skip for docs-only changes"
        if: needs.detect-changes.outputs.docs_only == 'true'
        run: echo "Skipping - documentation only changes"

      - name: "Git Checkout"
        if: needs.detect-changes.outputs.docs_only != 'true'
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Setup Bun + Turbo"
        if: needs.detect-changes.outputs.docs_only != 'true'
        uses: ./.github/actions/setup-bun-turbo

      - name: "Run Lint"
        if: needs.detect-changes.outputs.docs_only != 'true'
        env:
          TURBO_TELEMETRY_DISABLED: "1"
          TURBO_NO_UPDATE_NOTIFIER: "1"
          DO_NOT_TRACK: "1"
          NO_COLOR: "1"
        run: bunx turbo run lint --output-logs=errors-only --log-order=grouped

      - name: "Run Type-Aware Lint"
        if: needs.detect-changes.outputs.docs_only != 'true'
        env:
          TURBO_TELEMETRY_DISABLED: "1"
          TURBO_NO_UPDATE_NOTIFIER: "1"
          DO_NOT_TRACK: "1"
          NO_COLOR: "1"
        run: bunx turbo run lint:types --output-logs=errors-only --log-order=grouped

      - name: "Run Typecheck"
        if: needs.detect-changes.outputs.docs_only != 'true'
        env:
          TURBO_TELEMETRY_DISABLED: "1"
          TURBO_NO_UPDATE_NOTIFIER: "1"
          DO_NOT_TRACK: "1"
          NO_COLOR: "1"
        run: bunx turbo run typecheck --output-logs=errors-only --log-order=grouped

      - name: "Run Build"
        if: needs.detect-changes.outputs.docs_only != 'true'
        shell: bash
        env:
          TURBO_TELEMETRY_DISABLED: "1"
          TURBO_NO_UPDATE_NOTIFIER: "1"
          DO_NOT_TRACK: "1"
          NO_COLOR: "1"
        run: |
          set -euo pipefail
          mkdir -p ci-logs
          bunx turbo run build --output-logs=errors-only --log-order=grouped 2>&1 | tee "ci-logs/bun-build-${{ matrix.os }}.log"

      - name: "Run Tests"
        if: needs.detect-changes.outputs.docs_only != 'true'
        shell: bash
        env:
          TURBO_TELEMETRY_DISABLED: "1"
          TURBO_NO_UPDATE_NOTIFIER: "1"
          DO_NOT_TRACK: "1"
          NO_COLOR: "1"
        run: |
          set -euo pipefail
          mkdir -p ci-logs
          bunx turbo run test --output-logs=errors-only --log-order=grouped 2>&1 | tee "ci-logs/bun-test-${{ matrix.os }}.log"

      - name: "Upload Build/Test Logs"
        if: needs.detect-changes.outputs.docs_only != 'true' && (failure() || cancelled())
        uses: actions/upload-artifact@v7
        with:
          name: turbo-validate-logs-${{ matrix.os }}
          path: ci-logs/*.log
          retention-days: 7

  # =============================================================================
  # TypeScript code coverage
  # =============================================================================
  ts-code-coverage:
    name: "TypeScript Code Coverage"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/setup-bun-turbo

      - name: "Run Tests with Coverage"
        run: bun run coverage:check -- --output reports/coverage-thresholds.json

      - name: "Verify Coverage Output"
        run: |
          if [ ! -f coverage/lcov.info ]; then
            tmp=$(find coverage/ -name '.lcov.info.*.tmp' 2>/dev/null | head -1)
            if [ -n "$tmp" ]; then
              echo "Recovering coverage from temp file: $tmp"
              mv "$tmp" coverage/lcov.info
            else
              echo "::error::coverage/lcov.info not found"
              ls -la coverage/ 2>/dev/null || echo "coverage/ directory does not exist"
              exit 1
            fi
          fi
          echo "Coverage file size: $(wc -c < coverage/lcov.info) bytes"

      - name: "Upload Coverage"
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ts-code-coverage
          path: coverage/
          retention-days: 7

      - name: "Upload Coverage Threshold Report"
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ts-code-coverage-thresholds
          path: reports/coverage-thresholds.json
          retention-days: 7

  # =============================================================================
  # Shell script validation
  # =============================================================================
  validate-shell-scripts:
    name: "Validate Shell Scripts"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Install shellcheck"
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: "Run shellcheck"
        run: bash scripts/shellcheck/validate_shell_scripts.sh

  # =============================================================================
  # Dockerfile lint
  # =============================================================================
  hadolint:
    name: "Lint Dockerfile"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Run hadolint"
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ci/Dockerfile
          failure-threshold: error

  # =============================================================================
  # Dependabot config validation
  # =============================================================================
  validate-dependabot:
    name: "Validate Dependabot Config"
    runs-on: ubuntu-latest
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Validate Dependabot"
        run: bash scripts/validate_dependabot.sh

  # =============================================================================
  # Dead-code detection (PR-level, soft gate)
  # =============================================================================
  dead-code:
    name: "Dead Code Detection"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: "Install jq"
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - uses: ./.github/actions/setup-bun-turbo

      - name: "Run Dead Code Detection"
        run: |
          mkdir -p reports
          bun run dead-code:ts -- --output-dir=reports

      - name: "Upload Dead Code Report"
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dead-code-report
          path: reports/
          retention-days: 30

  # =============================================================================
  # NPM unpacked-size benchmark
  # =============================================================================
  benchmark-npm-unpacked-size:
    name: "Benchmark NPM Unpacked Size"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/setup-bun-turbo

      - name: "Build"
        env:
          TURBO_TELEMETRY_DISABLED: "1"
          TURBO_NO_UPDATE_NOTIFIER: "1"
          DO_NOT_TRACK: "1"
          NO_COLOR: "1"
        run: bunx turbo run build --output-logs=errors-only

      - name: "Run NPM Unpacked Size Benchmark"
        run: |
          mkdir -p reports
          bun run benchmark-npm-unpacked-size -- --output reports/npm-unpacked-size.json || echo "FAILED=true" >> "$GITHUB_ENV"
          exit 0

      - name: "Upload Benchmark Report"
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: npm-unpacked-size-report
          path: reports/npm-unpacked-size.json
          retention-days: 90

      - name: "Check Benchmark Result"
        if: always()
        run: |
          if [ "$FAILED" = "true" ]; then
            echo "::error::NPM unpacked size benchmark failed - threshold exceeded"
            cat reports/npm-unpacked-size.json || true
            exit 1
          fi
          echo "::notice::NPM unpacked size benchmark passed - within threshold"

  # =============================================================================
  # Package quality and template health
  # =============================================================================
  package-quality:
    name: "Package Quality"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/setup-bun-turbo

      - name: "Run Package Quality"
        run: bun run package:quality

      - name: "Upload Package Quality Logs"
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: package-quality-logs
          path: scratch/package-quality/
          retention-days: 7

  template-health:
    name: "Template Health"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/setup-bun-turbo

      - name: "Validate Template Health"
        run: bun run validate:template

  performance-budgets:
    name: "Performance Budgets"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true'
    steps:
      - name: "Git Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false

      - uses: ./.github/actions/setup-bun-turbo

      - name: "Run Performance Benchmarks"
        run: bun run benchmark:perf -- --output reports/performance.json

      - name: "Upload Performance Report"
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: performance-report
          path: reports/performance.json
          retention-days: 30
